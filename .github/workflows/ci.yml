name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Type-Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --project apps/api/tsconfig.build.json --noEmit

      - name: Build API
        run: npx nest build

      - name: Verify dist output
        run: |
          test -f dist/apps/api/apps/api/src/main.js || { echo "❌ main.js not found in dist"; exit 1; }
          test -f dist/apps/api/apps/api/src/app.module.js || { echo "❌ app.module.js not found in dist"; exit 1; }
          echo "✅ dist output verified"

      - name: Build CLI
        run: npx nest build cli

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ever-jobs-api:ci .

      - name: Verify Docker health
        run: |
          docker run -d --name ever-jobs-test -p 3000:3000 ever-jobs-api:ci
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || true)
          docker logs ever-jobs-test
          docker stop ever-jobs-test
          docker rm ever-jobs-test
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
          else
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
